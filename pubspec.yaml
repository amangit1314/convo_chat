name: convo_chat
description: A next level chatting application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.16.1 <3.0.0'

dependencies:
  agora_uikit: ^0.0.4
  animate_do: ^2.1.0
  cached_network_image: ^3.2.0
  cloud_firestore: ^3.1.10
  cupertino_icons: ^1.0.2
  firebase_auth: ^3.3.10
  firebase_core: ^1.13.1
  firebase_messaging: ^11.2.9
  firebase_storage: ^10.2.9
  floating_bottom_navigation_bar: ^1.5.2
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.9.2
  flutter_svg: ^1.0.3
  fluttertoast: ^8.0.9
  font_awesome_flutter: ^9.1.0
  get: ^4.3.8
  google_fonts: ^2.1.0
  google_sign_in: ^5.2.4
  image_picker: ^0.8.4+11
  intl: ^0.17.0
  provider: ^6.0.1
  rive: ^0.8.1
  shared_preferences: ^2.0.13

dev_dependencies:
  flutter_lints: ^1.0.4
  flutter_test:
    sdk: flutter

flutter_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/icon/icon.png'

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/others/
    - assets/svg/
    - assets/fonts/
  fonts:
    - family: PT Sans
      fonts:
        - asset: assets/fonts/PTSans-Regular.ttf
        - asset: assets/fonts/PTSans-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Thin.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
